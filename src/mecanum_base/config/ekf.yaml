# ============================================================
#  EKF CONFIGURAZIONE PER ROBOT MECANUM (ROS2)
#  File completamente commentato e ottimizzato
# ============================================================

ekf_filter_node:
  ros__parameters:

    # --------------------------------------------------------
    # FREQUENZA DI OUTPUT
    # --------------------------------------------------------
    # Frequenza con cui l’EKF pubblica /odometry/filtered.
    # Valore tipico: 15–50 Hz. Più alto = più fluido.
    frequency: 30.0

    # --------------------------------------------------------
    # MODALITÀ 2D
    # --------------------------------------------------------
    # Per robot Mecanum indoor è ESSENZIALE.
    # Ignora roll/pitch e z.
    two_d_mode: true

    # --------------------------------------------------------
    # PUBBLICAZIONE TF
    # --------------------------------------------------------
    # L’EKF pubblica la trasformazione odom → base_footprint.
    publish_tf: true

    # --------------------------------------------------------
    # FRAME DI RIFERIMENTO
    # --------------------------------------------------------
    # map: frame globale (usato da AMCL)
    # odom: frame locale continuo (usato per navigazione)
    # base_footprint: frame del robot sul pavimento
    # world_frame: frame usato dall’EKF per la fusione
    # Per robot indoor SENZA GPS → world_frame = odom
    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: odom

    # ========================================================
    #  INPUT 1 — ODOMETRIA
    # ========================================================
    # Topic odometria pubblicato dal controller Mecanum.
    # Deve essere nav_msgs/Odometry.
    odom0: /odom

    # --------------------------------------------------------
    # CONFIGURAZIONE ODOMETRIA
    # --------------------------------------------------------
    # Vettore di 15 valori:
    # [x, y, z,
    #  roll, pitch, yaw,
    #  vx, vy, vz,
    #  vroll, vpitch, vyaw,
    #  ax, ay, az]
    #
    # CONFIGURAZIONE OTTIMALE PER ROBOT MECANUM:
    # - Usa posizione x,y
    # - Usa yaw
    # - Usa velocità x,y
    # - Usa velocità angolare yaw
    # - NON usa z, roll, pitch
    odom0_config: [true,  true,  false,
                   false, false, true,
                   true,  true,  false,
                   false, false, true,
                   false, false, false]

    # ========================================================
    #  INPUT 2 — IMU
    # ========================================================
    # Topic IMU (sensor_msgs/Imu)
    imu0: imu/data

    # --------------------------------------------------------
    # CONFIGURAZIONE IMU
    # --------------------------------------------------------
    # Per robot Mecanum:
    # - Usa yaw (orientamento)
    # - Usa yaw_vel (velocità angolare Z)
    # - Usa accelerazioni X,Y
    # - NON usa roll/pitch (perché siamo in 2D)
    imu0_config: [false, false, false,
                  false, false, true,
                  false, false, false,
                  false, false, true,
                  true,  true,  false]

    # --------------------------------------------------------
    # RIMOZIONE GRAVITÀ
    # --------------------------------------------------------
    # Importante per accelerometri IMU.
    imu0_remove_gravitational_acceleration: true

    # --------------------------------------------------------
    # DIFFERENZIALE IMU
    # --------------------------------------------------------
    # false = usa valori assoluti (corretto per IMU standard)
    imu0_differential: false

    # ========================================================
    #  NOTE IMPORTANTI
    # ========================================================
    # 1. Assicurati che /odom e /imu/data abbiano COVARIANZE NON NULLE.
    #    Se una covarianza è 0 → EKF ignora quel dato.
    #
    # 2. Assicurati che il TF sia:
    #       map → odom → base_footprint → base_link
    #
    # 3. L’EKF produce:
    #       /odometry/filtered
    #    che deve essere usato da:
    #       - Nav2
    #       - SLAM Toolbox (localization mode)
    #       - AMCL
    #
    # 4. Per robot Mecanum, la fusione ideale è:
    #       ODOMETRIA: posizione + velocità
    #       IMU: yaw + yaw_vel + accelerazioni
    #
    # 5. Questa configurazione è allineata con:
    #       - Turtlebot4
    #       - Jackal (Clearpath)
    #       - Ridgeback
    #       - Mecanum DIY più diffusi
    #       - Documentazione ufficiale robot_localization
