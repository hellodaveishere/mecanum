slam_toolbox:
  ros__parameters:

    mode: "mapping"

    # Carica una mappa esistente
    load_map: true
    map_file_name: "maps/mappa_base.yaml"

    use_sim_time: false

    map_update_interval: 5.0
    resolution: 0.05

    odom_frame: odom
    map_frame: map
    base_frame: base_footprint
    scan_topic: /scan

    do_loop_closing: true
    do_relocalization: true
    allow_update: true
