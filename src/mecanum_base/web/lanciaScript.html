<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Gestione Script</title>

  <!-- Bootstrap -->
  <link rel="stylesheet" href="css/bootstrap.min.css" />
  <script src="js/bootstrap.bundle.min.js"></script>

  <style>
    /* Log window personalizzata */
    #logWindow {
      background: #f8f9fa;
      border: 1px solid #dee2e6;
      border-radius: 4px;
      height: 250px;
      overflow-y: auto;
      white-space: pre-wrap;
      display: none;
      padding: 10px;
    }
  </style>
</head>

<body class="bg-light">

<div class="container py-4">

  <h1 class="mb-4">Gestione lauch file di ROS2 e Script</h1>

  <!--
  <p class="text-muted">
    Seleziona un launch file ROS2 o uno script dal menu a tendina.  
  </p>
  -->

  <!-- ============================================================
       SELEZIONE SCRIPT
       ============================================================ -->
  <div class="mb-3">
    <label for="scriptSelect" class="form-label fw-bold">Seleziona un launch file ROS2 o uno script:</label>
    <select id="scriptSelect" class="form-select w-auto" onchange="onScriptChange()">
      <option value="start_mecanum">start_mecanum</option>
      <option value="script1">script1</option>
      <option value="script2">script2</option>
      <option value="script3">script3</option>
    </select>
  </div>

  <!-- ============================================================
       STATO SCRIPT
       ============================================================ -->
  <div id="status" class="fw-bold mb-3 text-danger">
    Stato: sconosciuto
  </div>

  <!-- ============================================================
       PULSANTI START / STOP
       ============================================================ -->
  <div class="mb-3">
    <button class="btn btn-success me-2" onclick="startScript()">Start</button>
    <button class="btn btn-danger" onclick="stopScript()">Stop</button>
  </div>

  <!-- ============================================================
       CHECKBOX LOG
       ============================================================ -->
  <div class="form-check mb-3">
    <input class="form-check-input" type="checkbox" id="chkLog" onchange="toggleLog()">
    <label class="form-check-label" for="chkLog">
      Mostra log
    </label>
  </div>

  <!-- ============================================================
       FINESTRA LOG
       ============================================================ -->
  <div id="logWindow"></div>

  <!-- ============================================================
       BOTTONE ROS2 GUI — SEMPRE IN BASSO A SINISTRA
       ============================================================ -->
  <div class="mt-5">
    <button class="btn btn-primary" onclick="openRos2Gui()">
      Apri ROS2 GUI
    </button>
  </div>

</div> <!-- container -->

<script>
  // ============================================================
  // CONFIGURAZIONE
  // ============================================================

  let logEnabled = false;
  let logInterval = null;

  function getSelectedScript() {
    return document.getElementById("scriptSelect").value;
  }

  // ============================================================
  // STATO UI
  // ============================================================

  function setStatus(running, pid = null) {
    const el = document.getElementById("status");

    if (running) {
      el.textContent = pid
        ? `Stato: IN ESECUZIONE (PID ${pid})`
        : `Stato: IN ESECUZIONE`;
      el.classList.remove("text-danger");
      el.classList.add("text-success");
    } else {
      el.textContent = "Stato: FERMO";
      el.classList.remove("text-success");
      el.classList.add("text-danger");
    }
  }

  function onScriptChange() {
    setStatus(false);
    document.getElementById("logWindow").textContent = "";
  }

  // ============================================================
  // START SCRIPT
  // ============================================================

  function startScript() {
    const name = getSelectedScript();

    fetch(`/start/${name}`, { method: "POST" })
      .then(r => r.text())
      .then(msg => {
        const match = msg.match(/PID\s+(\d+)/);
        if (match) setStatus(true, match[1]);
        else setStatus(true);
      })
      .catch(err => {
        console.error("Errore nello start:", err);
        setStatus(false);
      });
  }

  // ============================================================
  // STOP SCRIPT
  // ============================================================

  function stopScript() {
    const name = getSelectedScript();

    fetch(`/stop/${name}`, { method: "POST" })
      .then(r => r.text())
      .then(msg => setStatus(false))
      .catch(err => console.error("Errore nello stop:", err));
  }

  // ============================================================
  // LOG — polling attivo SOLO quando abilitato
  // ============================================================

  function isAtBottom(el) {
    return el.scrollTop + el.clientHeight >= el.scrollHeight - 5;
  }

  function startLogPolling() {
    if (logInterval !== null) return;

    logInterval = setInterval(() => {
      const name = getSelectedScript();
      const logWindow = document.getElementById("logWindow");

      const userWasAtBottom = isAtBottom(logWindow);

      fetch(`/log/${name}`)
        .then(r => r.text())
        .then(text => {
          logWindow.textContent = text;
          if (userWasAtBottom) logWindow.scrollTop = logWindow.scrollHeight;
        })
        .catch(err => console.error("Errore log:", err));
    }, 1000);
  }

  function stopLogPolling() {
    if (logInterval !== null) {
      clearInterval(logInterval);
      logInterval = null;
    }
  }

  function toggleLog() {
    logEnabled = document.getElementById("chkLog").checked;
    const logWindow = document.getElementById("logWindow");

    logWindow.style.display = logEnabled ? "block" : "none";

    if (logEnabled) startLogPolling();
    else stopLogPolling();
  }

  // ============================================================
  // APRI ROS2 GUI
  // ============================================================

  function openRos2Gui() {
    window.open("ros2_gui.html", "_blank");
  }

  // ============================================================
  // INIZIALIZZAZIONE
  // ============================================================

  window.addEventListener("load", () => {
    setStatus(false);
    toggleLog(); // sincronizza checkbox ↔ polling
  });
</script>

</body>
</html>
