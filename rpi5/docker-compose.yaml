services:

  ros2-dev:
    container_name: ros2-dev

    # 🔥 Soluzione standard: collega Dockerfile al servizio
    build:
      context: .
      dockerfile: Dockerfile

    image: ros2-dev-test:latest

    privileged: true
    network_mode: host
    pid: host
    ipc: host

    environment:
      ROS_AUTOMATIC_DISCOVERY_RANGE: SUBNET
      ROS_DOMAIN_ID: "42"
      RMW_IMPLEMENTATION: rmw_cyclonedds_cpp
      PS1: "[ROS2-CONTAINER ros2-dev] \\u@\\h:\\w$ "

    volumes:
      #- .:/home/ws
      - /home/dave/ws:/home/ws
      - /dev:/dev
      - /dev/dri:/dev/dri
      - ${HOME}/.ssh:/home/dave/.ssh

    devices:
      - /dev/gpiochip0
      - /dev/gpiochip1
      - /dev/gpiochip2
      - /dev/gpiochip3
      - /dev/gpiochip4

    group_add:
      - tty
      - dialout
      - gpio

    cap_add:
      - SYS_NICE
      
    ulimits:
      rtprio: 99


    working_dir: /home/ws
    command: ["sleep", "infinity"]


  ros2-dev-gui:
    extends:
      service: ros2-dev

    container_name: ros2-dev-gui

    environment:
      DISPLAY: ${DISPLAY:-":0"}
      PS1: "[ROS2-CONTAINER ros2-dev-gui] \\u@\\h:\\w$ "

    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix

    profiles:
      - gui

